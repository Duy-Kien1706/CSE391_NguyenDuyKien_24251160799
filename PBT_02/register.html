<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>

<form action="#" method="POST">

    <fieldset>
        <legend>Thông tin cá nhân</legend>

        <label for="fullname">Họ tên:</label>
        <input type="text" id="fullname" name="fullname" placeholder="Nhập họ tên" required minlength="2" maxlength="50">

        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Nhập email" required>

        <br><br>

        <label for="phone">Số điện thoại:</label>
        <input type="tel" id="phone" name="phone" placeholder="Nhập 10 chữ số" pattern="^\d{10}$" required>

        <br><br>

        <label for="dob">Ngày sinh:</label>
        <input type="date" id="dob" name="dob" max="2026-04-30" required>

    </fieldset>

    <br>

    <fieldset>
        <legend>Tài khoản</legend>

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="3-20 ký tự (a-z, 0-9, _)" pattern="^[a-zA-Z0-9_]{3,20}$" required>

        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Ít nhất 8 ký tự, 1 chữ hoa, 1 số"
               minlength="8" pattern="^(?=.*[A-Z])(?=.*\d).{8,}$" required>

        <br><br>

        <label for="confirm">Xác nhận password:</label>
        <input type="password" id="confirm" name="confirm" placeholder="Nhập lại mật khẩu" required>

    </fieldset>

    <br>


    <fieldset>
        <legend>Thông tin giao hàng</legend>

        <label for="city">Thành phố:</label>
        <select id="city" name="city" required>
            <option value="">--Chọn thành phố--</option>
            <option value="hn">Hà Nội</option>
            <option value="hcm">TP.HCM</option>
            <option value="dn">Đà Nẵng</option>
            <option value="hp">Hải Phòng</option>
            <option value="ct">Cần Thơ</option>
        </select>

        <br><br>

        <label for="district">Quận/Huyện:</label>
        <select id="district" name="district" required>
            <option value="">--Chọn quận/huyện--</option>
            <option value="q1">Quận 1</option>
            <option value="q2">Quận 2</option>
            <option value="q3">Quận 3</option>
        </select>

        <br><br>

        <label for="address">Địa chỉ chi tiết:</label>
        <textarea id="address" name="address" rows="3" placeholder="Nhập địa chỉ cụ thể" required></textarea>

        <br><br>

        <span>Giới tính:</span>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">Nam</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Nữ</label>

        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Khác</label>

    </fieldset>

    <br>


    <input type="checkbox" id="terms" name="terms" required>
    <label for="terms">Tôi đồng ý điều khoản</label>

    <br><br>


    <button type="submit">Đăng ký</button>
    <button type="reset">Nhập lại</button>

</form>

</body>
</html>
