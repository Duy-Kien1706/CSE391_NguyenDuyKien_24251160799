<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng ký</title>
</head>
<body>
    <form action="#" method= "POST">
        <fieldset>
            <legend>Thông tin tài khoản</legend>
            <label for="email">Email:</label>
            <input type="email" id = "email" name = "email" required placeholder = "you@email.com"><br>

            <label for="pass">Mật khẩu:</label>
            <input type="password"  id = "pass" name = "pass" 
            required minlength = "8" pattern = "(?=.*\d)(? = .*[a-z])(? = .*[A-Z].{8,})" 
            title = "Ít nhất 8 ký  tự, gồm chữ hoa, thường và số"><br>

            <label for="phone">SDT: </label>
            <input type="tel" id = "phone" name = "phone" pattern = "[0-9]{10}" placholder = "0901234567"><br>

            <label for="dob">Ngày Sinh:</label>
            <input type="date" id = "bob" name= "bob" max = "2010-01-01"><br>
        </fieldset>
        <label for="">
            <input type="checkbox" name = "agree" required>
            Tôi đồng ý với các điều khoản trên
        </label><br>
        <button type = "submit">Đăng ký</button>
    </form>
</body>
</html>
