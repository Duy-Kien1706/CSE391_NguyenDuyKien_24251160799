<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>

<h1>Đặt hàng</h1>

<form action="#" method="POST">

    <h2>Giỏ hàng</h2>

    <label for="search">Tìm sản phẩm:</label>
    <input type="text" id="search" name="search" placeholder="Nhập tên sản phẩm" list="products">
    <datalist id="products">
        <option value="Điện thoại">
        <option value="Laptop">
        <option value="Tai nghe">
    </datalist>

    <br><br>

    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>STT</th>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Điện thoại</td>
                <td>10,000,000</td>
                <td>1</td>
                <td>10,000,000</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Laptop</td>
                <td>20,000,000</td>
                <td>1</td>
                <td>20,000,000</td>
            </tr>

            <tr>
                <td>3</td>
                <td>Tai nghe</td>
                <td>2,000,000</td>
                <td>2</td>
                <td>4,000,000</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="4"><strong>Tổng cộng</strong></td>
                <td>
                    <output>34,000,000</output>
                </td>
            </tr>
        </tfoot>
    </table>

    <br>


    <label>Điểm tích lũy:</label>
    <progress value="70" max="100"></progress>

    <hr>

    <!-- PHẦN 2: THANH TOÁN -->
    <h2>Thanh toán</h2>

    <p>Phương thức thanh toán:</p>

    <input type="radio" id="cod" name="payment" value="cod" required>
    <label for="cod">COD</label>

    <input type="radio" id="bank" name="payment" value="bank">
    <label for="bank">Chuyển khoản</label>

    <input type="radio" id="wallet" name="payment" value="wallet">
    <label for="wallet">Ví điện tử</label>

    <br><br>

    <label for="coupon">Mã giảm giá:</label>
    <input type="text" id="coupon" name="coupon"
           placeholder="SALE2026"
           pattern="^SALE\d{4}$">

    <br><br>

    <label for="note">Ghi chú:</label>
    <textarea id="note" name="note" rows="3" placeholder="Ghi chú thêm (không bắt buộc)"></textarea>

    <hr>


    <h2>Thông tin giao hàng</h2>

    <label for="delivery-date">Ngày giao hàng:</label>
    <input type="date" id="delivery-date" name="delivery_date" min="2026-05-01" required>

    <br><br>

    <label for="time-slot">Khung giờ:</label>
    <select id="time-slot" name="time_slot" required>
        <option value="">--Chọn--</option>
        <option value="morning">Sáng (8-12h)</option>
        <option value="afternoon">Chiều (14-18h)</option>
        <option value="evening">Tối (18-21h)</option>
    </select>

    <br><br>

    <label for="days">Thời gian giao (số ngày):</label>
    <input type="range" id="days" name="days" min="1" max="7" step="1">

    <br><br>


    <button type="submit" aria-label="Xác nhận đặt hàng">Đặt hàng</button>

</form>

</body>
</html>
