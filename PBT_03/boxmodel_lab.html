<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Lab</title>

    <link rel="stylesheet" href="boxmodel.css">
</head>

<body>

    <h1>Phần 1 — Content-box vs Border-box</h1>

    <div class="box-container">

        <div class="box content-box">
            <h2>Content Box</h2>
            <p>
                width: 300px<br>
                padding: 20px<br>
                border: 5px
            </p>
        </div>

        <div class="box border-box">
            <h2>Border Box</h2>
            <p>
                width: 300px<br>
                padding: 20px<br>
                border: 5px
            </p>
        </div>

    </div>

    <hr>

    <h1>Phần 2 — Layout 3 cột</h1>

    <h2>Trường hợp KHÔNG dùng border-box</h2>

    <div class="layout no-border-box">

        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Main Content
        </div>

        <div class="ads">
            Ads
        </div>

    </div>

    <h2>Trường hợp CÓ dùng border-box</h2>

    <div class="layout border-layout">

        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Main Content
        </div>

        <div class="ads">
            Ads
        </div>

    </div>

</body>

</html>
